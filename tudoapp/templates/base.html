 {% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>

   
    <link rel="stylesheet" href="{% static 'css/output.css' %}" />
  </head>

  <body class="min-h-screen bg-slate-950">
    <!-- Background Effects -->
    <div class="fixed inset-0 -z-10 overflow-hidden">
      <div
        class="absolute top-0 left-0 h-96 w-96 bg-violet-700/20 blur-3xl rounded-full"
      ></div>
      <div
        class="absolute bottom-0 right-0 h-96 w-96 bg-blue-700/20 blur-3xl rounded-full"
      ></div>
    </div>

    <!-- Navbar -->
    <nav
      class="sticky top-0 z-50 border-b border-white/10 bg-slate-900/70 backdrop-blur-xl"
    >
      <div class="max-w-7xl mx-auto px-6">
        <div class="h-20 flex items-center justify-between">
          <!-- Logo -->
          <a href="{% url 'task_list' %}" class="flex items-center gap-4">
            <div
              class="h-12 w-12 rounded-2xl bg-gradient-to-r from-violet-600 to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-violet-600/30"
            >
              ✓
            </div>

            <div>
              <h1 class="text-lg sm:text-xl font-bold text-white">TaskFlow</h1>

              <p class="hidden sm:block text-xs text-slate-400">
                Productivity Workspace
              </p>
            </div>
          </a>

          <!-- Menu -->
          <!-- Menu -->
          <div class="flex items-center gap-2 sm:gap-4">
            <a
              href="{% url 'task_list' %}"
              class="hidden md:block px-4 py-2 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition"
            >
              Dashboard
            </a>

            <a
              href="{% url 'task_add' %}"
              class="hidden sm:flex px-4 py-2.5 rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold shadow-lg shadow-violet-600/30 hover:scale-105 transition duration-300"
            >
              + Create Task
            </a>

            {% if user.is_authenticated %}

            <!-- USER INFO -->

            <!-- LOGOUT -->
            <a
              href="{% url 'logout_view' %}"
              class="px-4 sm:px-5 py-2.5 rounded-xl border border-red-500/30 bg-red-500/10 text-red-200 font-medium hover:bg-red-500/20 hover:text-white transition-all duration-300"
            >
              Logout
            </a>

            {% else %}

            <!-- LOGIN -->
            <a
              href="{% url 'login_view' %}"
              class="px-4 sm:px-5 py-2.5 rounded-xl border border-white/10 bg-white/5 text-slate-200 font-medium hover:bg-white/10 hover:text-white transition-all duration-300"
            >
              Login
            </a>

            <!-- SIGNUP -->
            <a
              href="{% url 'signup_view' %}"
              class="px-4 sm:px-5 py-2.5 rounded-xl bg-gradient-to-r from-violet-600 via-indigo-600 to-blue-600 text-white font-semibold shadow-lg shadow-violet-600/30 hover:shadow-violet-500/50 hover:scale-105 transition-all duration-300"
            >
              Signup
            </a>

            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-6 py-5">
      {% block content %} {% endblock %}
    </main>
    <!-- footer -->
     {% include "includes/footer.html" %}
  </body>
</html>
