<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body class="min-h-screen bg-slate-950">

    <!-- Background Effects -->
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute top-0 left-0 h-96 w-96 bg-violet-700/20 blur-3xl rounded-full"></div>
        <div class="absolute bottom-0 right-0 h-96 w-96 bg-blue-700/20 blur-3xl rounded-full"></div>
    </div>

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 border-b border-white/10 bg-slate-900/70 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6">
            <div class="h-20 flex items-center justify-between">

                <!-- Logo -->
                <a href="{% url 'task_list' %}" class="flex items-center gap-4">

                    <div class="h-12 w-12 rounded-2xl bg-gradient-to-r from-violet-600 to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-violet-600/30">
                        ✓
                    </div>

                    <div>
                        <h1 class="text-xl font-bold text-white">
                            TaskFlow
                        </h1>

                        <p class="text-xs text-slate-400">
                            Productivity Workspace
                        </p>
                    </div>

                </a>

                <!-- Menu -->
                <div class="flex items-center gap-4">

                    <a
                        href="{% url 'task_list' %}"
                        class="px-4 py-2 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition"
                    >
                        Dashboard
                    </a>

                    <a
                        href="{% url 'task_add' %}"
                        class="px-5 py-3 rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold shadow-lg shadow-violet-600/30 hover:scale-105 transition duration-300"
                    >
                        + Create Task
                    </a>

                </div>

            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
