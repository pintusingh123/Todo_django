{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white/5 border border-white/10 backdrop-blur-xl rounded-2xl shadow-xl p-8">

    <!-- Heading -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-100">
        Welcome back to TaskFlow
      </h1>
      <p class="text-slate-300 mt-2">
        Login to your TaskFlow account
      </p>
    </div>

    <!-- 🔥 Messages / Errors -->
    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl border 
                    border-red-500/30 bg-red-500/10 
                    text-red-300 text-sm">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <!-- Form -->
    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-slate-200 mb-2">
          Username
        </label>
        {{ form.username }}
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-200 mb-2">
          Password
        </label>
        {{ form.password }}
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition duration-300"
      >
        Login
      </button>
    </form>

    <!-- Signup link -->
    <div class="mt-6 text-center">
      <p class="text-slate-400">
        Don't have an account?
        <a
          href="{% url 'signup_view' %}"
          class="text-indigo-400 hover:text-indigo-300 font-semibold underline"
        >
          Sign Up
        </a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
