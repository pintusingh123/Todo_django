{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center   px-4">
  <div class="w-full max-w-md shadow-gray-700 rounded-2xl shadow-xl p-8">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-100">
        Welcome back to Taskflow 
      </h1>
      <p class="text-slate-200  mt-2">
        Login to your TaskFlow account
      </p>
    </div>

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-slate-200 mb-2">
          Username
        </label>
        {{ form.username }}
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-200 mb-2">
          Password
        </label>
        {{ form.password }}
      </div>

      <button
        type="submit"
        class="w-full bg-indigo-50 hover:bg-indigo-700 text-black font-semibold py-3 rounded-xl transition duration-300"
      >
        Login
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-slate-400">
        Don't have an account?
        <a
          href="{% url 'signup_view' %}"
          class="text-indigo-600  underline hover:text-indigo-700 font-semibold"
        >
          Sign Up
        </a>
      </p>
    </div>

  </div>
</div>

{% endblock %}
